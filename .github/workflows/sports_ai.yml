name: Sports AI System - Continuous Learning

on:
  push:
    branches:
      - main
  schedule:
    - cron: "0 */6 * * *" # Se ejecuta cada 6 horas (12am, 6am, 12pm, 6pm)
  workflow_dispatch: # Permite ejecutarlo manualmente desde GitHub para probar

jobs:
  sports-ml-pipeline:
    runs-on: ubuntu-latest
    # Permisos necesarios para que la Action pueda escribir cambios en el repo
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Trae todo el historial para evitar conflictos al pushear

      - name: Set Up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: 'pip' # Acelera las ejecuciones futuras

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create Directories
        run: |
          mkdir -p models
          mkdir -p data/processed

      - name: Ingest and Prepare Data
        run: |
          # Aquí descargas los nuevos datos de deportes
          python training/prepare_data.py

      - name: Train and Improve Model
        run: |
          # Este script debe cargar el modelo anterior y mejorarlo con los datos nuevos
          python training/train_model.py

      - name: Run New Predictions
        run: |
          # Genera las predicciones para los próximos partidos
          python app/predict.py

      - name: Save Changes (Continuous Learning)
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # Añadimos el modelo actualizado y los datos nuevos
          git add models/*.json models/*.pkl data/feedback.csv || true
          
          # Solo hacemos commit si hubo cambios reales
          if git diff --quiet && git diff --staged --quiet; then
            echo "No hay cambios nuevos en el modelo."
          else
            git commit -m "Auto-update: Modelo mejorado y nuevas predicciones [$(date -u +'%Y-%m-%d %H:%M:%S') UTC]"
            git push
          fi
